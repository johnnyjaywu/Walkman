name: Build and Deploy to Itch.io

on:
  # Manual trigger with UI inputs
  workflow_dispatch:
    inputs:
      itchUsername:
        description: 'Itch.io Username (Leave empty to use repo default)'
        required: false
        type: string
      itchGameId:
        description: 'Itch.io Game ID slug (Leave empty to use repo default)'
        required: false
        type: string
      buildWebGL:
        description: 'Build WebGL'
        required: true
        default: true
        type: boolean
      buildWindows:
        description: 'Build Windows'
        required: true
        default: false
        type: boolean
      buildMacOS:
        description: 'Build MacOS'
        required: true
        default: false
        type: boolean
      buildLinux:
        description: 'Build Linux'
        required: true
        default: false
        type: boolean

# Prevents overlapping builds
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Filter platforms based on user selection
  setup:
    name: Configure Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          PLATFORMS=""
          if [ "${{ github.event.inputs.buildWebGL }}" == "true" ]; then
            PLATFORMS+='{"targetPlatform":"WebGL","itchChannel":"webgl-html5"},'
          fi
          if [ "${{ github.event.inputs.buildWindows }}" == "true" ]; then
            PLATFORMS+='{"targetPlatform":"StandaloneWindows64","itchChannel":"windows"},'
          fi
          if [ "${{ github.event.inputs.buildMacOS }}" == "true" ]; then
            PLATFORMS+='{"targetPlatform":"StandaloneOSX","itchChannel":"mac"},'
          fi
          if [ "${{ github.event.inputs.buildLinux }}" == "true" ]; then
            PLATFORMS+='{"targetPlatform":"StandaloneLinux64","itchChannel":"linux"},'
          fi
          
          PLATFORMS=${PLATFORMS%,}
          
          if [ -z "$PLATFORMS" ]; then
             PLATFORMS='{"targetPlatform":"WebGL","itchChannel":"webgl-html5"}'
          fi
          
          echo "matrix={\"include\":[$PLATFORMS]}" >> "$GITHUB_OUTPUT"

  # Job 2: Build selected platforms
  build:
    name: Build ${{ matrix.targetPlatform }}
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.targetPlatform }}-
            Library-
      
      # Important: Frees up ~10GB of disk space to avoid "No space left" errors
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc

      - name: Run Unity Build
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: ${{ matrix.targetPlatform }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.targetPlatform }}
          path: build/${{ matrix.targetPlatform }}
          retention-days: 90

  # Job 3: Push to itch.io
  deploy:
    name: Deploy ${{ matrix.targetPlatform }} to Itch
    needs: [setup, build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-${{ matrix.targetPlatform }}
          path: build

      - name: Debug Itch Target
        env:
          USERNAME: ${{ inputs.itchUsername || vars.ITCH_USERNAME }}
          GAME_ID: ${{ inputs.itchGameId || vars.ITCH_GAME_ID }}
          CHANNEL: ${{ matrix.itchChannel }}
        run: |
          echo "Attempting to deploy to: $USERNAME/$GAME_ID:$CHANNEL"
          if [ -z "$USERNAME" ] || [ -z "$GAME_ID" ]; then
            echo "ERROR: Itch Username or Game ID is missing!"
            exit 1
          fi

      - name: Deploy to itch.io
        uses: KikimoraGames/itch-publish@v0.0.3
        with:
          butlerApiKey: ${{ secrets.BUTLER_API_KEY }}
          gameData: ./build
          itchUsername: ${{ inputs.itchUsername || vars.ITCH_USERNAME }}
          itchGameId: ${{ inputs.itchGameId || vars.ITCH_GAME_ID }}
          buildChannel: ${{ matrix.itchChannel }}
          buildNumber: ${{ github.run_number }}
